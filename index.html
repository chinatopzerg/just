<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湘北 SBTI：全员发疯版</title>
    <style>
        :root {
            --primary: #ff0000; /* 湘北红 */
            --black: #111111;
            --white: #ffffff;
            --gray: #f4f4f4;
            --border: 3px solid var(--black);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--white);
            color: var(--black);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            border-bottom: var(--border);
            padding-bottom: 15px;
            margin-bottom: 30px;
            letter-spacing: -1px;
            background: var(--black);
            color: var(--white);
            text-align: center;
            transform: rotate(-1deg);
            line-height: 1.2;
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            background: var(--white);
            border: var(--border);
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            text-align: left;
            box-shadow: 4px 4px 0px var(--black);
        }

        .btn:hover {
            background: var(--primary);
            color: var(--white);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--black);
        }

        .btn-start {
            background: var(--primary);
            color: var(--white);
            text-align: center;
            font-size: 1.5rem;
        }

        .progress {
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-align: right;
            font-weight: bold;
            color: var(--primary);
        }

        .result-card {
            border: var(--border);
            padding: 30px;
            background: var(--gray);
            box-shadow: 10px 10px 0px var(--black);
            text-align: center;
        }

        .archetype-title {
            font-size: 2.2rem;
            color: var(--primary);
            margin: 20px 0;
            text-decoration: underline;
            text-decoration-style: wavy;
            text-decoration-color: var(--black);
        }

        .archetype-desc {
            font-size: 1.1rem;
            margin-bottom: 25px;
            text-align: left;
            border-left: 5px solid var(--black);
            padding-left: 15px;
            background: #fff;
            padding: 15px;
        }

        .hidden { display: none; }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .btn { padding: 15px; font-size: 0.95rem; }
            .container { padding: 15px; }
            .archetype-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 开始页面 -->
        <div id="start-screen">
            <h1>湘北 SBTI<br><span style="font-size: 0.5em; color: var(--primary);">全员发疯版</span></h1>
            <p style="margin-bottom: 30px; font-size: 1.1rem;">
                这是一个关于你“篮球部生存现状”的测试。<br>
                共10道题，每次随机抽取。<br>
                <strong>警告：本测试含“吗喽”量过高，请谨慎作答。</strong>
            </p>
            <button class="btn btn-start" onclick="startQuiz()">开始受刑</button>
        </div>

        <!-- 2. 问题页面 -->
        <div id="quiz-screen" class="hidden">
            <div class="progress">问题 <span id="current-q">1</span> / 10</div>
            <h2 id="question-text">问题加载中...</h2>
            <div id="options-container"></div>
        </div>

        <!-- 3. 结果页面 -->
        <div id="result-screen" class="hidden">
            <div class="result-card">
                <p>经检测，你的 SBTI 人格为：</p>
                <div class="archetype-title" id="result-title">...</div>
                <div class="archetype-desc" id="result-desc">...</div>
                <button class="btn" onclick="restartQuiz()">我不服，重测</button>
            </div>
        </div>
    </div>
